<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>News</title>
<link rel="manifest" href="manifest.json">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;color:#eee;font-family:-apple-system,Roboto,Arial,sans-serif;line-height:1.4}
  header{position:sticky;top:0;background:#111;border-bottom:1px solid #333;padding:10px 12px;display:flex;align-items:center;gap:8px;z-index:10}
  header h1{font-size:25.5px;flex:1}
  #status{font-size:16.5px;color:#888}
  #refresh{background:#1a1a1a;border:1px solid #333;color:#ccc;border-radius:8px;padding:10px 16px;font-size:22px;line-height:1}
  .cats{display:flex;gap:6px;overflow-x:auto;padding:8px 12px;background:#0a0a0a;border-bottom:1px solid #222;white-space:nowrap}
  .cat{background:#1a1a1a;border:1px solid #333;color:#ccc;padding:7px 16px;border-radius:14px;font-size:19.5px;flex-shrink:0}
  .cat.active{background:#2563eb;border-color:#2563eb;color:#fff}
  .item{display:block;padding:14px;border-bottom:1px solid #1c1c1c;text-decoration:none;color:#eee}
  .src{font-size:16.5px;color:#7aa2f7;text-transform:uppercase;letter-spacing:.04em}
  .ttl{font-size:24px;margin-top:3px;display:block;font-weight:600}
  .summary{font-size:20px;color:#aaa;margin-top:5px}
  .meta{font-size:16.5px;color:#666;margin-top:6px}
  .msg{padding:24px 14px;color:#888;font-size:20px}
  .err{color:#f87171}
</style>
</head>
<body>

<header>
  <h1>News</h1>
  <span id="status">—</span>
  <button id="refresh">↻</button>
</header>
<div class="cats" id="cats"></div>
<div id="list"><div class="msg">Loading…</div></div>

<script>
const TOPICS = {
  "Top": "",
  "World": "WORLD",
  "Business": "BUSINESS",
  "Tech": "TECHNOLOGY",
  "Sport": "SPORTS",
  "Entertainment": "ENTERTAINMENT",
  "Health": "HEALTH",
  "Science": "SCIENCE"
};
const PROXIES = [
  { build: url => "https://api.allorigins.win/get?url=" + encodeURIComponent(url), unwrap: txt => JSON.parse(txt).contents },
  { build: url => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url), unwrap: txt => txt },
  { build: url => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url), unwrap: txt => txt }
];
const PAGE_SIZE = 20;
let visibleCount = PAGE_SIZE;
let current = "Top";

const catsEl = document.getElementById('cats');
const listEl = document.getElementById('list');
const statusEl = document.getElementById('status');

function feedUrl(topic){
  return topic
    ? `https://news.google.com/rss/headlines/section/topic/${topic}?hl=en-GB&gl=GB&ceid=GB:en`
    : `https://news.google.com/rss?hl=en-GB&gl=GB&ceid=GB:en`;
}

function buildCats(){
  catsEl.innerHTML = '';
  Object.keys(TOPICS).forEach(name => {
    const b = document.createElement('button');
    b.className = 'cat' + (name === current ? ' active' : '');
    b.textContent = name;
    b.onclick = () => {
      current = name;
      visibleCount = PAGE_SIZE;
      buildCats();
      let cached = null;
      try { cached = JSON.parse(localStorage.getItem('news_cache_' + name)); } catch(e){}
      if(cached){
        render(cached.items.map(i => ({...i, pubDate: i.pubDate ? new Date(i.pubDate) : null})), true);
      }
      load(name);
    };
    catsEl.appendChild(b);
  });
}

function timeAgo(d){
  const s = Math.floor((Date.now() - d.getTime())/1000);
  if(s<60) return s+'s ago';
  const m=Math.floor(s/60); if(m<60) return m+'m ago';
  const h=Math.floor(m/60); if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

function stripHtml(str){
  const d = document.createElement('div');
  d.innerHTML = str || '';
  return d.textContent.trim();
}

function parseItem(node){
  const rawTitle = (node.querySelector('title')?.textContent || '').trim();
  const link = node.querySelector('link')?.textContent || '#';
  const pubDateRaw = node.querySelector('pubDate')?.textContent;
  const descRaw = node.querySelector('description')?.textContent || '';

  // Google News title format: "Headline - Source"
  let title = rawTitle, source = '';
  const m = rawTitle.match(/^(.*) - ([^-]+)$/);
  if(m){ title = m[1].trim(); source = m[2].trim(); }

  // description is an HTML blob with an <a> (often same as title) and sometimes more text/list of related links
  const descText = stripHtml(descRaw);
  // remove leading duplicate of the title from the summary if present
  let summary = descText.replace(title, '').replace(/^[\s\-–:]+/, '').trim();

  return {
    title, source, link,
    summary,
    pubDate: pubDateRaw ? new Date(pubDateRaw) : null
  };
}

let currentItems = [];

function render(items, fromCache){
  currentItems = items;
  if(!items.length){
    listEl.innerHTML = '<div class="msg">No headlines.</div>';
    return;
  }
  renderVisible();
  statusEl.textContent = fromCache ? 'cached' : 'live';
}

function renderVisible(){
  const slice = currentItems.slice(0, visibleCount);
  listEl.innerHTML = slice.map(it => `
    <a class="item" href="${it.link}" target="_blank" rel="noopener">
      <span class="src">${it.source}</span>
      <span class="ttl">${it.title}</span>
      ${it.summary ? `<div class="summary">${it.summary}</div>` : ''}
      <div class="meta">${it.pubDate ? timeAgo(it.pubDate) : ''}</div>
    </a>`).join('');
  if(currentItems.length > visibleCount){
    listEl.innerHTML += `<button id="showMore" class="cat" style="display:block;width:calc(100% - 28px);margin:14px;text-align:center;padding:12px">Show more</button>`;
    document.getElementById('showMore').onclick = () => {
      visibleCount += PAGE_SIZE;
      renderVisible();
    };
  }
}

async function fetchWithRetry(url, attempts, timeoutMs){
  let lastErr;
  for(let i = 0; i < attempts; i++){
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try{
      const r = await fetch(url, {cache:'no-store', signal: controller.signal});
      clearTimeout(timer);
      if(r.ok) return r;
      lastErr = new Error('HTTP ' + r.status);
    } catch(e){
      clearTimeout(timer);
      lastErr = e.name === 'AbortError' ? new Error('timed out') : e;
    }
    if(i < attempts - 1) await new Promise(res => setTimeout(res, 800 * (i+1)));
  }
  throw lastErr;
}

async function load(name, silent){
  if(!silent){
    statusEl.textContent = 'loading…';
  }
  const cacheKey = 'news_cache_' + name;
  let cached = null;
  try { cached = JSON.parse(localStorage.getItem(cacheKey)); } catch(e){}
  if(!silent){
    if(cached){
      render(cached.items.map(i => ({...i, pubDate: i.pubDate ? new Date(i.pubDate) : null})), true);
    } else {
      listEl.innerHTML = '<div class="msg">Loading…</div>';
    }
  }

  const url = feedUrl(TOPICS[name]);

  try{
    let xml, lastErr;
    for(const proxy of PROXIES){
      try{
        const r = await fetchWithRetry(proxy.build(url), 2, 8000);
        const raw = await r.text();
        const candidate = proxy.unwrap(raw);
        if(candidate && candidate.includes('<item')) { xml = candidate; lastErr = null; break; }
        lastErr = new Error('empty feed response');
      } catch(e){ lastErr = e; }
    }
    if(lastErr) throw lastErr;

    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const items = [...doc.querySelectorAll('item')].map(parseItem).slice(0, 60);

    localStorage.setItem(cacheKey, JSON.stringify({ts: Date.now(), items}));
    if(name === current) render(items, false);
  } catch(e){
    if(!silent){
      if(cached){
        statusEl.innerHTML = 'showing saved <span class="err">(connection weak)</span>';
      } else {
        listEl.innerHTML = '<div class="msg err">No connection yet — pull to refresh once you have signal.<br><span style="color:#666;font-size:14px">(' + (e.message||e) + ')</span></div>';
        statusEl.textContent = 'waiting for signal';
      }
    }
  }
}

async function prefetchOthers(){
  for(const name of Object.keys(TOPICS)){
    if(name === current) continue;
    await load(name, true);
  }
}

document.getElementById('refresh').onclick = () => load(current);

// Pull-to-refresh: standalone PWA mode has no native browser pull-to-refresh gesture,
// so implement a simple touch-based version.
let touchStartY = null;
let pullTriggered = false;

document.addEventListener('touchstart', (e) => {
  if(window.scrollY === 0){
    touchStartY = e.touches[0].clientY;
    pullTriggered = false;
  }
}, {passive: true});

document.addEventListener('touchmove', (e) => {
  if(touchStartY === null) return;
  const dy = e.touches[0].clientY - touchStartY;
  if(dy > 80 && !pullTriggered && window.scrollY === 0){
    pullTriggered = true;
    statusEl.textContent = 'refreshing…';
  }
}, {passive: true});

document.addEventListener('touchend', () => {
  if(pullTriggered){
    load(current);
  }
  touchStartY = null;
  pullTriggered = false;
}, {passive: true});

buildCats();
load(current).then(() => prefetchOthers());

if('serviceWorker' in navigator){
  // unregister any previously installed service worker from earlier versions of this app,
  // so stale cached HTML/JS never gets served instead of this file
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
}
</script>
</body>
</html>
